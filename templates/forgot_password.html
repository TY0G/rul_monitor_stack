{% extends 'base.html' %}

{% block title %}找回密码 - {{ SITE_NAME }}{% endblock %}
{% block shell_class %}shell-center narrow-shell{% endblock %}

{% block content %}
<section class="single-card glass">
    <div class="card-head">
        <span class="badge">Reset Password</span>
        <h1>忘记密码</h1>
        <p>通过邮箱验证码验证身份后，重新设置登录密码。</p>
    </div>

    <form method="post" class="form-grid">
        <div class="field">
            <label>邮箱</label>
            <input type="email" name="email" placeholder="请输入注册邮箱" required>
        </div>

        <div class="field code-field">
            <div>
                <label>邮箱验证码</label>
                <input type="text" name="code" placeholder="请输入 6 位验证码" maxlength="6" required>
            </div>
            <button
                class="secondary-btn send-code-btn"
                type="button"
                data-purpose="reset"
                data-email-selector="input[name='email']"
            >发送验证码</button>
        </div>

        <div class="field">
            <label>新密码</label>
            <input type="password" name="password" placeholder="至少 6 位" required>
        </div>

        <div class="field">
            <label>确认新密码</label>
            <input type="password" name="confirm_password" placeholder="再次输入新密码" required>
        </div>

        <button class="primary-btn full" type="submit">修改密码</button>
    </form>

    <div class="auth-links center">
        <a href="{{ url_for('login') }}">返回登录</a>
    </div>
</section>
{% endblock %}
